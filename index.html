<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐️ ستاره ی زندگیم ⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 2.1rem; margin: 30px 0 20px; line-height: 1.4; }
        p { font-size: 1.35rem; margin: 20px 0; }
        
        .question { display: none; }
        .question.active { display: block !important; }
        
        button {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 16px 25px;
            margin: 10px;
            border-radius: 20px;
            font-size: 1.25rem;
            width: 85%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐️ ستاره ی زندگیم ⭐️</h1>

        <!-- سوالات (خلاصه برای جلوگیری از طولانی شدن) -->
        <div id="q1" class="question active">
            <h1>سلام ستاره، حال دلت چطوره این روزها؟</h1>
            <button onclick="nextQuestion(1, 'خوبم')">خوبم 😊</button>
            <button onclick="nextQuestion(1, 'متوسطم')">متوسطم</button>
            <button onclick="nextQuestion(1, 'ناراحتم/دلتنگی')">ناراحتم / دلتنگم</button>
        </div>

        <!-- بقیه سوالات مثل قبل... (برای کوتاه شدن فقط q1 رو گذاشتم، بقیه رو خودت کپی کن) -->

        <div id="finish" class="question">
            <h1>ممنون که جواب دادی ⭐️</h1>
            <p>جواب‌هات ارسال شد.</p>
            <button onclick="finishTest()">بستن</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let answers = {};
        let currentPage = 1;

        function hideAll() {
            document.querySelectorAll('.question').forEach(q => q.classList.remove('active'));
        }

        function nextQuestion(q, answer) {
            answers[`q${q}`] = answer;
            currentPage = q;
            hideAll();
            // بقیه منطق صفحات...
        }

        function finishTest() {
            tg.close();
        }

        // ==================== آلرت خروج ====================
        function showExitConfirm() {
            if (currentPage >= 6) return;

            const exit = confirm("مطمئنی می‌خوای صفحه رو ببندی؟");
            if (exit) {
                const send = confirm("جوابایی که تا اینجا دادی رو برای امیررضا ارسال کنم؟");
                if (send) {
                    sendToTelegram();
                } else {
                    sendSpecialMessage(`⚠️ ستاره میخواست بره بیرون و جوابا رو نمیخواست بده.\nتا صفحه ${currentPage}`);
                }
                tg.close();
            }
        }

        tg.BackButton.show();
        tg.onEvent('backButtonClicked', showExitConfirm);

        window.addEventListener('beforeunload', (e) => {
            showExitConfirm();
            e.preventDefault();
            e.returnValue = '';
        });

        function sendToTelegram() {
            // ... کد ارسال جواب‌ها
            console.log("جواب‌ها ارسال شد");
        }

        function sendSpecialMessage(text) {
            console.log("پیام خاص:", text);
            // کد ارسال به بات
        }
    </script>
</body>
</html>
