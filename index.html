<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭐️ ستاره ی زندگیم ⭐️</title>
    
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #2575fc !important;
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 28px; margin: 30px 0 20px; }
        button {
            background: rgba(255,255,255,0.25);
            color: white;
            border: 2px solid white;
            padding: 18px;
            margin: 10px auto;
            border-radius: 20px;
            font-size: 18px;
            width: 85%;
            display: block;
        }
        .debug { 
            color: yellow; 
            background: rgba(0,0,0,0.5); 
            padding: 10px; 
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐️ ستاره ی زندگیم ⭐️</h1>
        <div class="debug" id="debug">در حال بارگذاری...</div>

        <!-- سوال ۱ -->
        <div id="q1">
            <h1>سلام ستاره، حال دلت چطوره این روزها؟</h1>
            <button onclick="goToQ2('خوبم')">خوبم 😊</button>
            <button onclick="goToQ2('متوسطم')">متوسطم</button>
            <button onclick="goToQ2('ناراحتم/دلتنگی')">ناراحتم / دلتنگم</button>
        </div>

        <!-- سوال ۲ -->
        <div id="q2" style="display: none;">
            <h1>این مدت به من فکر کردی؟</h1>
            <button onclick="shake(this)">بله، زیاد</button>
            <button onclick="shake(this)">گاهی</button>
            <button onclick="shake(this)">تقریباً نه</button>
            <button onclick="directNo()">نه</button>
        </div>

        <div id="sorryThink" style="display: none;">
            <h1>ببخشید سر سوال قبلی، اذیتت کردم 😔</h1>
            <p>ولی واقعاً بهم فکر می‌کردی یا نه؟</p>
            <button onclick="goNext()">بله، زیاد</button>
            <button onclick="goNext()">گاهی</button>
            <button onclick="goNext()">تقریباً نه</button>
            <button onclick="goNext()">نه</button>
        </div>

        <div class="debug" id="status">آماده</div>
    </div>

    <script>
        let answers = {};
        let hasClickedFake = false;

        function goToQ2(answer) {
            answers.q1 = answer;
            document.getElementById('q1').style.display = 'none';
            document.getElementById('q2').style.display = 'block';
            document.getElementById('debug').textContent = 'سوال ۲ فعال شد';
        }

        function shake(btn) {
            hasClickedFake = true;
            let i = 0;
            const int = setInterval(() => {
                const x = Math.random()*30 - 15;
                btn.style.transform = `translate(${x}px, 0)`;
                i++;
                if (i > 8) {
                    clearInterval(int);
                    btn.style.transform = '';
                }
            }, 80);
        }

        function directNo() {
            answers.q2 = "نه";
            document.getElementById('q2').style.display = 'none';
            document.getElementById('sorryThink').style.display = 'block';
            if (!hasClickedFake) {
                alert("⚠️ ستاره همون بار اول مستقیم گفت \"نه\"");
            }
        }

        function goNext() {
            document.getElementById('sorryThink').style.display = 'none';
            alert("ادامه به سوال بعدی (در نسخه کامل)");
        }

        window.onload = function() {
            document.getElementById('debug').textContent = "✅ صفحه لود شد - رنگ آبی باید ببینی";
        };
    </script>
</body>
</html>
