<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭐️ ستاره ی زندگیم ⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js" async></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        * { box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 480px;
            width: 100%;
        }
        h1 { font-size: 2.1rem; margin: 20px 0; }
        .debug { color: yellow; font-size: 1rem; margin: 10px 0; }
        button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            padding: 18px 25px;
            margin: 10px auto;
            border-radius: 20px;
            font-size: 1.25rem;
            width: 85%;
            display: block;
            transition: all 0.2s;
        }
        button:active { transform: scale(0.95); background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐️ ستاره ی زندگیم ⭐️</h1>
        <div class="debug">صفحه در حال بارگذاری...</div>

        <!-- سوال ۱ -->
        <div id="q1" class="question active">
            <h1>سلام ستاره، حال دلت چطوره این روزها؟</h1>
            <button class="answer-btn" data-q="1" data-answer="خوبم">خوبم 😊</button>
            <button class="answer-btn" data-q="1" data-answer="متوسطم">متوسطم</button>
            <button class="answer-btn" data-q="1" data-answer="ناراحتم/دلتنگی">ناراحتم / دلتنگم</button>
        </div>

        <!-- سوال ۲ -->
        <div id="q2" class="question">
            <h1>این مدت به من فکر کردی؟</h1>
            <button class="fake-btn">بله، زیاد</button>
            <button class="fake-btn">گاهی</button>
            <button class="fake-btn">تقریباً نه</button>
            <button id="directNoBtn" class="answer-btn" data-q="2" data-answer="نه">نه</button>
        </div>

        <!-- بقیه صفحات مشابه قبل -->
        <div id="sorryThink" class="question">
            <h1>ببخشید سر سوال قبلی، اذیتت کردم 😔</h1>
            <p>ولی واقعاً بهم فکر می‌کردی یا نه؟</p>
            <button class="answer-btn" data-q="2" data-answer="بله، زیاد">بله، زیاد</button>
            <button class="answer-btn" data-q="2" data-answer="گاهی">گاهی</button>
            <button class="answer-btn" data-q="2" data-answer="تقریباً نه">تقریباً نه</button>
            <button class="answer-btn" data-q="2" data-answer="نه">نه</button>
        </div>

        <div id="q3" class="question">
            <h1>دلیل اصلی اینکه گفتی نمی‌خوای در ارتباط باشیم چی بود؟</h1>
            <input type="text" id="reasonInput" placeholder="دلیلت رو بنویس...">
            <br><br>
            <button onclick="submitReason()">ارسال</button>
        </div>

        <!-- صفحات بعدی را برای کوتاه‌تر شدن فعلاً مشابه قبل نگه داشتم. بعداً کامل می‌کنیم -->
        <div id="finish" class="question">
            <h1>ممنون که جواب دادی ⭐️</h1>
            <p>جواب‌هات ارسال شد.</p>
            <button onclick="finishTest()">بستن</button>
        </div>
    </div>

    <script>
        console.log("Script started");

        // Telegram WebApp با مدیریت خطا
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.expand();
                tg.ready();
                console.log("Telegram WebApp initialized");
            }
        } catch(e) {
            console.log("Telegram WebApp not available:", e);
        }

        let answers = {};
        let hasClickedFake = false;

        function hideAll() {
            document.querySelectorAll('.question').forEach(q => q.classList.remove('active'));
        }

        function showPage(id) {
            hideAll();
            const el = document.getElementById(id);
            if (el) el.classList.add('active');
        }

        function shakeButton(btn) {
            hasClickedFake = true;
            let i = 0;
            const int = setInterval(() => {
                const x = Math.random() * 40 - 20;
                const y = Math.random() * 30 - 15;
                btn.style.transform = `translate(${x}px, ${y}px)`;
                i++;
                if (i > 10) {
                    clearInterval(int);
                    btn.style.transform = '';
                }
            }, 70);
        }

        function handleDirectNo() {
            answers.q2 = "نه";
            showPage('sorryThink');
            if (!hasClickedFake && tg) {
                sendSpecialMessage(`⚠️ ستاره همون بار اول مستقیم گفت "نه"`);
            }
        }

        window.submitReason = function() {
            const reason = document.getElementById('reasonInput').value.trim() || "نداد";
            answers.q3 = reason;
            showPage('q4'); // بعداً q4 را اضافه کن
        };

        window.finishTest = function() {
            if (tg) tg.close();
        };

        function sendToTelegram() {
            // ... (همان کد قبلی)
            console.log("Answers sent:", answers);
        }

        function sendSpecialMessage(text) {
            console.log("Special message:", text);
        }

        // راه‌اندازی
        function init() {
            document.querySelector('.debug').textContent = "صفحه بارگذاری شد ✅";

            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const q = parseInt(this.getAttribute('data-q'));
                    answers[`q${q}`] = this.getAttribute('data-answer');

                    if (q === 1) showPage('q2');
                    else if (q === 2) {
                        if (this.id === 'directNoBtn') handleDirectNo();
                        else showPage('sorryThink'); // اصلاح شد
                    }
                });
            });

            document.querySelectorAll('.fake-btn').forEach(btn => {
                btn.addEventListener('click', () => shakeButton(btn));
            });

            document.getElementById('directNoBtn').addEventListener('click', handleDirectNo);
        }

        document.addEventListener('DOMContentLoaded', init);
        window.addEventListener('load', () => {
            init();
            document.querySelector('.debug').textContent = "کاملاً آماده ✅";
        });
    </script>
</body>
</html>
