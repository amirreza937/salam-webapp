<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭐️ ستاره ی زندگیم ⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js" async defer></script>
    
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: #2575fc !important;
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        h1 { font-size: 28px; margin: 30px 0 25px; }
        p { font-size: 20px; margin: 20px 0; }
        button {
            background: rgba(255,255,255,0.25) !important;
            color: white !important;
            border: 2px solid white !important;
            padding: 20px;
            margin: 12px auto;
            border-radius: 20px;
            font-size: 20px;
            width: 85%;
            display: block;
        }
        button:active { transform: scale(0.95); background: rgba(255,255,255,0.45) !important; }
        #debug { color: yellow; font-size: 16px; margin: 15px 0; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
    </style>
</head>
<body>
    <div>
        <h1>⭐️ ستاره ی زندگیم ⭐️</h1>
        <div id="debug">در حال بارگذاری...</div>

        <!-- سوال ۱ -->
        <div id="q1">
            <h1>سلام ستاره، حال دلت چطوره این روزها؟</h1>
            <button onclick="answerQ1('خوبم')">خوبم 😊</button>
            <button onclick="answerQ1('متوسطم')">متوسطم</button>
            <button onclick="answerQ1('ناراحتم/دلتنگی')">ناراحتم / دلتنگم</button>
        </div>

        <!-- سوال ۲ -->
        <div id="q2" style="display:none">
            <h1>این مدت به من فکر کردی؟</h1>
            <button onclick="shake(this)">بله، زیاد</button>
            <button onclick="shake(this)">گاهی</button>
            <button onclick="shake(this)">تقریباً نه</button>
            <button onclick="directNo()">نه</button>
        </div>

        <!-- صفحه معذرت‌خواهی -->
        <div id="sorry" style="display:none">
            <h1>ببخشید سر سوال قبلی، اذیتت کردم 😔</h1>
            <p>ولی واقعاً بهم فکر می‌کردی یا نه؟</p>
            <button onclick="finishWithAnswer('بله، زیاد')">بله، زیاد</button>
            <button onclick="finishWithAnswer('گاهی')">گاهی</button>
            <button onclick="finishWithAnswer('تقریباً نه')">تقریباً نه</button>
            <button onclick="finishWithAnswer('نه')">نه</button>
        </div>

        <!-- پایان -->
        <div id="finish" style="display:none">
            <h1>ممنون که جواب دادی ⭐️</h1>
            <p>جواب‌هات ارسال شد.</p>
            <button onclick="finishTest()">بستن</button>
        </div>
    </div>

    <script>
        let tg = null;
        try {
            tg = window.Telegram.WebApp;
            if (tg) {
                tg.expand();
                tg.ready();
            }
        } catch(e) {}

        let answers = {};
        let hasClickedFake = false;

        function log(msg) {
            const debug = document.getElementById('debug');
            debug.innerHTML += "<br>" + msg;
            console.log(msg);
        }

        function answerQ1(ans) {
            answers.q1 = ans;
            log("✅ سوال ۱ جواب داده شد: " + ans);
            document.getElementById('q1').style.display = 'none';
            document.getElementById('q2').style.display = 'block';
        }

        function shake(btn) {
            hasClickedFake = true;
            log("فیک کلیک شد");
            let i = 0;
            const int = setInterval(() => {
                const x = Math.random() * 40 - 20;
                btn.style.transform = `translate(${x}px, ${Math.random()*20-10}px)`;
                i++;
                if (i > 12) {
                    clearInterval(int);
                    btn.style.transform = '';
                }
            }, 70);
        }

        function directNo() {
            answers.q2 = "نه";
            log("🔴 دکمه «نه» مستقیم زده شد");
            document.getElementById('q2').style.display = 'none';
            document.getElementById('sorry').style.display = 'block';
            
            if (!hasClickedFake) {
                log("⚠️ ارسال آلرت خاص...");
                sendSpecialMessage(`⚠️ ستاره همون بار اول مستقیم گفت "نه"`);
            }
        }

        function finishWithAnswer(ans) {
            answers.q2 = ans;
            log("✅ جواب نهایی: " + ans);
            document.getElementById('sorry').style.display = 'none';
            document.getElementById('finish').style.display = 'block';
            sendToTelegram();
        }

        function sendToTelegram() {
            let result = `⭐️ جواب‌های ستاره ⭐️\n\n`;
            result += `۱. حالش: ${answers.q1 || "نامشخص"}\n`;
            result += `۲. به من فکر کرده: ${answers.q2 || "نامشخص"}\n`;

            log("📤 در حال ارسال جواب‌ها...");

            const token = "8954970877:AAGtf-MRanTknXYG6VtdixcC-bLBXR5FE1s";
            const chatId = "1314214026";

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: result })
            })
            .then(r => r.json())
            .then(data => log("✅ جواب‌ها با موفقیت ارسال شد"))
            .catch(err => {
                log("❌ خطا در ارسال جواب: " + err.message);
                // فال‌بک: سعی دوباره
                setTimeout(() => {
                    fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ chat_id: chatId, text: result })
                    });
                }, 1000);
            });
        }

        function sendSpecialMessage(text) {
            log("📤 ارسال آلرت: " + text);
            const token = "8954970877:AAGtf-MRanTknXYG6VtdixcC-bLBXR5FE1s";
            const chatId = "1314214026";

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: text })
            })
            .then(() => log("✅ آلرت ارسال شد"))
            .catch(err => log("❌ خطا در آلرت: " + err.message));
        }

        function finishTest() {
            if (tg) tg.close();
        }

        // نمایش اولیه
        window.onload = () => log("✅ صفحه آماده شد - تست کن");
    </script>
</body>
</html>
