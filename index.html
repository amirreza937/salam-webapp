<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐️ستاره ی زندگیم⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 2.4rem; margin: 40px 0 30px; }
        
        .question {
            display: none;
            animation: fadeIn 0.6s ease;
        }
        .active { 
            display: block !important; 
        }
        
        button, .option {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 16px 28px;
            margin: 12px;
            border-radius: 20px;
            font-size: 1.3rem;
            width: 85%;
        }
        input {
            width: 85%;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: 20px;
            border: none;
            margin: 20px 0;
        }
        @keyframes fadeIn { from {opacity: 0; transform: translateY(20px);} to {opacity: 1; transform: translateY(0);} }
    </style>
</head>
<body>
    <div class="container">

        <!-- سوال ۱ -->
        <div id="q1" class="question active">
            <h1>امروز چطوری؟</h1>
            <button onclick="handleFirstAnswer('خوبم')">خوبم 😊</button>
            <button onclick="handleFirstAnswer('خوب نیستم')">خوب نیستم 😔</button>
        </div>

        <!-- دلیل ناراحتی -->
        <div id="reason" class="question">
            <h1>چرا خوب نیستی؟</h1>
            <input type="text" id="reasonInput" placeholder="دلیلش رو بنویس...">
            <br><br>
            <button onclick="submitReason()">ارسال دلیل</button>
        </div>

        <!-- پیام همدردی -->
        <div id="empathy" class="question">
            <h1 id="empathyText"></h1>
            <button onclick="askContinue()">ادامه بدم؟</button>
        </div>

        <!-- ادامه یا خروج -->
        <div id="continueAsk" class="question">
            <h1>می‌خوای ادامه بدیم؟</h1>
            <button onclick="startQuestions()">آره، ادامه بده</button>
            <button onclick="tg.close()">نه، فعلاً بسشه</button>
        </div>

        <!-- سوال دوم (بعداً بیشتر اضافه می‌کنیم) -->
        <div id="q2" class="question">
            <h1>سوال دوم رو بعداً طراحی می‌کنیم</h1>
            <button onclick="finishTest()">پایان تست و ارسال</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let answers = {};

        function hideAll() {
            document.querySelectorAll('.question').forEach(q => {
                q.classList.remove('active');
            });
        }

        function handleFirstAnswer(answer) {
            hideAll();
            answers.q1 = answer;

            if (answer === 'خوبم') {
                alert("عالیه! خیلی خوشحالم که خوبی 😊");
                document.getElementById('q2').classList.add('active');
            } else {
                document.getElementById('reason').classList.add('active');
            }
        }

        function submitReason() {
            const reason = document.getElementById('reasonInput').value.trim() || "نداد";
            answers.reason = reason;
            hideAll();

            document.getElementById('empathyText').innerHTML = `ای وای خیلی ناراحتم بخاطر<br><b>${reason}</b>`;
            document.getElementById('empathy').classList.add('active');
        }

        function askContinue() {
            hideAll();
            document.getElementById('continueAsk').classList.add('active');
        }

        function startQuestions() {
            hideAll();
            document.getElementById('q2').classList.add('active');
        }

        function finishTest() {
            let result = `📋 تست جدید:\n\n`;
            result += `۱. چطوری؟ → ${answers.q1 || "نامشخص"}\n`;
            if (answers.reason) result += `دلیل ناراحتی → ${answers.reason}\n`;

            const token = "8954970877:AAGtf-MRanTknXYG6VtdixcC-bLBXR5FE1s";
            const chatId = "1314214026";

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: result })
            });

            alert("✅ جواب‌ها با موفقیت ارسال شد!");
            tg.close();
        }
    </script>
</body>
</html>
