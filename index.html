<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭐️ ستاره ی زندگیم ⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
            touch-action: manipulation;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 2.1rem; margin: 30px 0 20px; line-height: 1.4; }
        p { font-size: 1.35rem; margin: 20px 0; }
        
        .question { display: none; }
        .question.active { display: block !important; }
        
        button {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 18px 25px;
            margin: 12px auto;
            border-radius: 20px;
            font-size: 1.25rem;
            width: 85%;
            display: block;
            cursor: pointer;
            touch-action: manipulation;
            transition: all 0.2s;
        }
        button:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.95);
        }
        input {
            width: 80%;
            padding: 15px;
            margin: 15px 0;
            border-radius: 15px;
            border: none;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐️ ستاره ی زندگیم ⭐️</h1>

        <!-- سوال ۱ -->
        <div id="q1" class="question active">
            <h1>سلام ستاره، حال دلت چطوره این روزها؟</h1>
            <button class="answer-btn" data-q="1" data-answer="خوبم">خوبم 😊</button>
            <button class="answer-btn" data-q="1" data-answer="متوسطم">متوسطم</button>
            <button class="answer-btn" data-q="1" data-answer="ناراحتم/دلتنگی">ناراحتم / دلتنگم</button>
        </div>

        <!-- سوال ۲ -->
        <div id="q2" class="question">
            <h1>این مدت به من فکر کردی؟</h1>
            <button class="fake-btn">بله، زیاد</button>
            <button class="fake-btn">گاهی</button>
            <button class="fake-btn">تقریباً نه</button>
            <button class="answer-btn" data-q="2" data-answer="نه">نه</button>
        </div>

        <!-- صفحه معذرت‌خواهی -->
        <div id="sorryThink" class="question">
            <h1>ببخشید سر سوال قبلی، اذیتت کردم 😔</h1>
            <p>ولی واقعاً بهم فکر می‌کردی یا نه؟</p>
            <button class="answer-btn" data-q="2" data-answer="بله، زیاد">بله، زیاد</button>
            <button class="answer-btn" data-q="2" data-answer="گاهی">گاهی</button>
            <button class="answer-btn" data-q="2" data-answer="تقریباً نه">تقریباً نه</button>
            <button class="answer-btn" data-q="2" data-answer="نه">نه</button>
        </div>

        <!-- بقیه سوالات رو بعداً اضافه می‌کنیم، فعلاً اینو تست کن -->

        <div id="finish" class="question">
            <h1>ممنون که جواب دادی ⭐️</h1>
            <p>جواب‌هات ارسال شد.</p>
            <button onclick="finishTest()">بستن</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let answers = {};
        let hasClickedFake = false;
        let currentPage = 1;

        function hideAll() {
            document.querySelectorAll('.question').forEach(q => q.classList.remove('active'));
        }

        // Event Listener برای همه دکمه‌ها (بهینه برای iOS)
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.answer-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const q = parseInt(this.getAttribute('data-q'));
                    const answer = this.getAttribute('data-answer');
                    
                    answers[`q${q}`] = answer;
                    currentPage = q;
                    hideAll();

                    if (q === 1) document.getElementById('q2').classList.add('active');
                    else if (q === 2) document.getElementById('q3').classList.add('active'); // بعداً اضافه می‌کنیم
                });
            });

            // دکمه‌های فیک
            document.querySelectorAll('.fake-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    shakeButton(this);
                });
            });
        });

        function shakeButton(btn) {
            hasClickedFake = true;
            let i = 0;
            const interval = setInterval(() => {
                const x = Math.random() * 40 - 20;
                const y = Math.random() * 30 - 15;
                btn.style.transform = `translate(${x}px, ${y}px)`;
                i++;
                if (i > 10) {
                    clearInterval(interval);
                    btn.style.transform = '';
                }
            }, 70);
        }

        function handleDirectNo() {
            // بعداً کامل می‌کنیم
        }

        function finishTest() {
            tg.close();
        }
    </script>
</body>
</html>
