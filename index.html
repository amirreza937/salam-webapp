<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>⭐️ ستاره ی زندگیم ⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js" async defer></script>
    
    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc) !important;
            background-color: #2575fc !important;
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 28px; margin: 25px 0 20px; }
        p { font-size: 20px; margin: 20px 0; }
        button {
            background: rgba(255,255,255,0.25) !important;
            color: white !important;
            border: 2px solid rgba(255,255,255,0.6) !important;
            padding: 18px 25px;
            margin: 12px auto;
            border-radius: 20px;
            font-size: 20px;
            width: 85%;
            display: block;
        }
        button:active { transform: scale(0.95); background: rgba(255,255,255,0.45) !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⭐️ ستاره ی زندگیم ⭐️</h1>

        <!-- سوال ۱ -->
        <div id="q1">
            <h1>سلام ستاره، حال دلت چطوره این روزها؟</h1>
            <button onclick="answerQ1('خوبم')">خوبم 😊</button>
            <button onclick="answerQ1('متوسطم')">متوسطم</button>
            <button onclick="answerQ1('ناراحتم/دلتنگی')">ناراحتم / دلتنگم</button>
        </div>

        <!-- سوال ۲ -->
        <div id="q2" style="display:none;">
            <h1>این مدت به من فکر کردی؟</h1>
            <button class="fake" onclick="shake(this)">بله، زیاد</button>
            <button class="fake" onclick="shake(this)">گاهی</button>
            <button class="fake" onclick="shake(this)">تقریباً نه</button>
            <button onclick="directNo()">نه</button>
        </div>

        <!-- صفحه معذرت‌خواهی -->
        <div id="sorry" style="display:none;">
            <h1>ببخشید سر سوال قبلی، اذیتت کردم 😔</h1>
            <p>ولی واقعاً بهم فکر می‌کردی یا نه؟</p>
            <button onclick="answerReal('بله، زیاد')">بله، زیاد</button>
            <button onclick="answerReal('گاهی')">گاهی</button>
            <button onclick="answerReal('تقریباً نه')">تقریباً نه</button>
            <button onclick="answerReal('نه')">نه</button>
        </div>

        <!-- پایان -->
        <div id="finish" style="display:none;">
            <h1>ممنون که جواب دادی ⭐️</h1>
            <p>جواب‌هات ارسال شد.</p>
            <button onclick="finishTest()">بستن</button>
        </div>
    </div>

    <script>
        let tg = null;
        try { tg = window.Telegram.WebApp; if(tg) { tg.expand(); tg.ready(); } } catch(e){}

        let answers = {};
        let hasClickedFake = false;

        function answerQ1(ans) {
            answers.q1 = ans;
            document.getElementById('q1').style.display = 'none';
            document.getElementById('q2').style.display = 'block';
        }

        function shake(btn) {
            hasClickedFake = true;
            let i = 0;
            const int = setInterval(() => {
                const x = Math.random() * 40 - 20;
                btn.style.transform = `translate(${x}px, ${Math.random()*20-10}px)`;
                i++;
                if (i > 12) { clearInterval(int); btn.style.transform = ''; }
            }, 70);
        }

        function directNo() {
            answers.q2 = "نه";
            document.getElementById('q2').style.display = 'none';
            document.getElementById('sorry').style.display = 'block';
            
            if (!hasClickedFake && tg) {
                sendSpecialMessage(`⚠️ ستاره همون بار اول مستقیم گفت "نه"`);
            }
        }

        function answerReal(ans) {
            answers.q2 = ans;
            document.getElementById('sorry').style.display = 'none';
            document.getElementById('finish').style.display = 'block';
            sendToTelegram();
        }

        function sendToTelegram() {
            let result = `⭐️ جواب‌های ستاره ⭐️\n\n`;
            result += `۱. حالش: ${answers.q1 || "نامشخص"}\n`;
            result += `۲. به من فکر کرده: ${answers.q2 || "نامشخص"}\n`;

            const token = "8954970877:AAGtf-MRanTknXYG6VtdixcC-bLBXR5FE1s";
            const chatId = "1314214026";

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: result })
            });
        }

        function sendSpecialMessage(text) {
            const token = "8954970877:AAGtf-MRanTknXYG6VtdixcC-bLBXR5FE1s";
            const chatId = "1314214026";
            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: text })
            });
        }

        function finishTest() {
            if (tg) tg.close();
        }
    </script>
</body>
</html>
