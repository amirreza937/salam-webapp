<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐️ستاره ی زندگیم⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 2.3rem; margin: 35px 0 25px; line-height: 1.3; }
        
        .question { display: none; }
        .active { display: block !important; }
        
        button {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 16px 28px;
            margin: 12px;
            border-radius: 20px;
            font-size: 1.3rem;
            width: 85%;
        }
        input {
            width: 85%;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: 20px;
            border: none;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- سوال ۱ -->
        <div id="q1" class="question active">
            <h1>امروز چطوری؟</h1>
            <button onclick="handleFirstAnswer('خوبم')">خوبم 😊</button>
            <button onclick="handleFirstAnswer('خوب نیستم')">خوب نیستم 😔</button>
        </div>

        <!-- دلیل ناراحتی -->
        <div id="reason" class="question">
            <h1>چرا خوب نیستی؟</h1>
            <input type="text" id="reasonInput" placeholder="دلیلش رو بنویس...">
            <br><br>
            <button onclick="submitReason()">ارسال دلیل</button>
        </div>

        <!-- همدردی + ادامه -->
        <div id="empathyPage" class="question">
            <h1 id="empathyText">ای وای خیلی ناراحتم...</h1>
            <p style="font-size:1.4rem; margin:30px 0;">می‌خوای ادامه بدیم؟</p>
            <button onclick="startQuestions()">آره، ادامه بده</button>
            <button onclick="finishAndClose()">نه، فعلاً بسشه</button>
        </div>

        <!-- سوال ۲ -->
        <div id="q2" class="question">
            <h1>پس می‌خوای باهم حرف بزنیم دیگه ⭐️ستاره⭐️؟</h1>
            <button onclick="handleSecondAnswer(true)">آره، حتماً ❤️</button>
            <button onclick="handleSecondAnswer(false)">نه، فعلاً نه</button>
        </div>

        <!-- صفحه پایان -->
        <div id="finish" class="question">
            <h1>تموم شد! 🎉</h1>
            <button onclick="finishTest()">ارسال جواب‌ها به امیررضا</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let answers = {};

        function hideAll() {
            document.querySelectorAll('.question').forEach(q => q.classList.remove('active'));
        }

        function handleFirstAnswer(answer) {
            hideAll();
            answers.q1 = answer;

            if (answer === 'خوبم') {
                document.getElementById('q2').classList.add('active');
            } else {
                document.getElementById('reason').classList.add('active');
            }
        }

        function submitReason() {
            const reason = document.getElementById('reasonInput').value.trim() || "نداد";
            answers.reason = reason;
            hideAll();

            document.getElementById('empathyText').innerHTML = `ای وای خیلی ناراحتم بخاطر<br><b>${reason}</b>`;
            document.getElementById('empathyPage').classList.add('active');
        }

        function startQuestions() {
            hideAll();
            document.getElementById('q2').classList.add('active');
        }

        function handleSecondAnswer(wantsToTalk) {
            hideAll();
            answers.q2 = wantsToTalk ? "آره، حتماً" : "نه";

            if (wantsToTalk) {
                document.getElementById('finish').classList.add('active');
            } else {
                finishAndClose();
            }
        }

        function finishAndClose() {
            let result = `📋 تست جدید:\n\n`;
            result += `۱. چطوری؟ → ${answers.q1 || "نامشخص"}\n`;
            if (answers.reason) result += `دلیل ناراحتی → ${answers.reason}\n`;
            result += `۲. می‌خوای حرف بزنیم؟ → ${answers.q2 || "نامشخص"}\n`;

            sendToTelegram(result);
            alert("مرسی که اومدی ❤️\n\nصفحه در حال بسته شدن...");
            tg.close();
            setTimeout(() => window.close(), 600);
        }

        function finishTest() {
            let result = `📋 تست جدید:\n\n`;
            result += `۱. چطوری؟ → ${answers.q1 || "نامشخص"}\n`;
            if (answers.reason) result += `دلیل ناراحتی → ${answers.reason}\n`;
            result += `۲. می‌خوای حرف بزنیم؟ → ${answers.q2 || "آره"}\n`;

            sendToTelegram(result);
            alert("✅ جواب‌ها ارسال شد!");
            tg.close();
        }

        function sendToTelegram(text) {
            const token = "8954970877:AAGtf-MRanTknXYG6VtdixcC-bLBXR5FE1s";
            const chatId = "1314214026";

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: text })
            });
        }
    </script>
</body>
</html>
