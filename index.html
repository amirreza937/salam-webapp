<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐️ستاره ی زندگیم⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            animation: fadeIn 0.8s ease;
        }
        h1 {
            font-size: 2.4rem;
            margin: 40px 0 30px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .question {
            display: none;
            animation: slideUp 0.6s ease forwards;
        }
        .active { display: block; }
        
        button, .option {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 16px 28px;
            margin: 12px;
            border-radius: 20px;
            font-size: 1.25rem;
            width: 85%;
            transition: all 0.3s;
        }
        button:hover, .option:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }
        #noBtn {
            position: relative;
            transition: all 0.15s ease;
        }
        input {
            width: 85%;
            padding: 18px;
            font-size: 1.2rem;
            border-radius: 20px;
            border: none;
            margin: 25px 0;
            text-align: center;
        }
        @keyframes fadeIn { from {opacity: 0;} to {opacity: 1;} }
        @keyframes slideUp { from {transform: translateY(30px); opacity: 0;} to {transform: translateY(0); opacity: 1;} }
    </style>
</head>
<body>
    <div class="container">
        <!-- سوال ۱ -->
        <div id="q1" class="question active">
            <h1>سلام! 👋<br>امروز چطوری؟</h1>
            <button onclick="next(1, 'عالی‌ام 🔥')">عالی‌ام 🔥</button>
            <button onclick="next(1, 'خوبم')">خوبم</button>
            <button onclick="next(1, 'م ordinary')">م ordinary</button>
        </div>

        <!-- سوال شیطون ۲ -->
        <div id="q2" class="question">
            <h1>راستشو بگو...<br>عاشق من هستی؟ ❤️</h1>
            <button onclick="next(2, 'بله خیلی ❤️')">بله خیلی ❤️</button>
            <button id="noBtn" onmouseover="moveNoButton(this)">خیر 😌</button>
        </div>

        <!-- سوال‌های بعدی رو بعداً اضافه می‌کنیم -->
        <div id="q3" class="question">
            <h1>سوال ۳ (بعداً عوض می‌کنیم)</h1>
            <button onclick="next(3, 'گزینه ۱')">گزینه ۱</button>
            <button onclick="next(3, 'گزینه ۲')">گزینه ۲</button>
        </div>

        <div id="finish" class="question">
            <h1>تموم شد! 🎉</h1>
            <button onclick="finishTest()">ارسال جواب‌ها به امیررضا</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let answers = {};

        function next(q, text) {
            answers[`q${q}`] = text;
            document.getElementById(`q${q}`).classList.remove('active');
            const nextQ = document.getElementById(`q${q+1}`);
            if (nextQ) nextQ.classList.add('active');
            else document.getElementById('finish').classList.add('active');
        }

        function moveNoButton(btn) {
            const x = Math.random() * 280 - 140;
            const y = Math.random() * 200 - 100;
            btn.style.transform = `translate(${x}px, ${y}px)`;
        }

        function finishTest() {
            let result = `📋 تست جدید از یک نفر:\n\n`;
            Object.keys(answers).forEach(key => {
                result += `${key}: ${answers[key]}\n`;
            });

            const token = "8954970877:AAGtf-MRanTknXYG6VtdixcC-bLBXR5FE1s";
            const chatId = "1314214026";

            fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ chat_id: chatId, text: result })
            });

            alert("✅ همه جواب‌ها با موفقیت ارسال شد!");
            tg.close();
        }
    </script>
</body>
</html>
