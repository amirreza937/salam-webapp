<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐️ستاره ی زندگیم⭐️</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
        }
        .container { max-width: 480px; margin: 0 auto; }
        h1 { font-size: 2.3rem; margin: 35px 0 25px; line-height: 1.3; }
        
        .question { display: none; }
        .active { display: block !important; }
        
        button, .option {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            padding: 16px 28px;
            margin: 12px;
            border-radius: 20px;
            font-size: 1.3rem;
            width: 85%;
        }
        #noBtn {
            position: relative;
            transition: all 0.1s ease-out;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- سوالات قبلی (خلاصه) -->
        <div id="q1" class="question active">
            <h1>امروز چطوری؟</h1>
            <button onclick="handleFirstAnswer('خوبم')">خوبم 😊</button>
            <button onclick="handleFirstAnswer('خوب نیستم')">خوب نیستم 😔</button>
        </div>

        <!-- ... (سوالات قبلی بدون تغییر) ... -->

        <!-- سوال ۴ - شیطون قوی برای گوشی -->
        <div id="q4" class="question">
            <h1>آیا من دارم اذیتت میکنم؟ 😅</h1>
            <button onclick="handleFourthAnswer(true)">آره، داری اذیتم میکنی</button>
            <button id="noBtn" onclick="moveNoButton(this)">نه، اذیت نمی‌کنی</button>
        </div>

        <div id="q5" class="question">
            <h1>چقدر اذیتت میکنم؟</h1>
            <button onclick="handleFifthAnswer('0-30')">0 تا ۳۰</button>
            <button onclick="handleFifthAnswer('31-60')">۳۱ تا ۶۰</button>
            <button onclick="handleFifthAnswer('61-100')">۶۱ تا ۱۰۰</button>
        </div>

        <div id="finish" class="question">
            <h1>تموم شد! 🎉</h1>
            <button onclick="finishTest()">ارسال جواب‌ها به امیررضا</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let answers = {};

        function hideAll() {
            document.querySelectorAll('.question').forEach(q => q.classList.remove('active'));
        }

        // سوالات قبلی (خلاصه شده)
        function handleFirstAnswer(answer) { hideAll(); answers.q1 = answer;
            if (answer === 'خوبم') document.getElementById('q2').classList.add('active');
            else document.getElementById('reason').classList.add('active');
        }
        function submitReason() { /* ... */ }
        function startQuestions() { hideAll(); document.getElementById('q2').classList.add('active'); }
        function handleSecondAnswer(wantsToTalk) { hideAll(); answers.q2 = wantsToTalk ? "آره، حتماً" : "نه";
            if (wantsToTalk) document.getElementById('q3').classList.add('active'); else finishAndClose();
        }
        function handleThirdAnswer(isSure) { hideAll(); answers.q3 = isSure ? "آره، مطمئنم" : "نه، شک دارم";
            if (isSure) document.getElementById('q4').classList.add('active');
            else document.getElementById('q2').classList.add('active');
        }

        function handleFourthAnswer(isAnnoying) {
            hideAll();
            answers.q4 = isAnnoying ? "آره، داری اذیتم میکنی" : "نه";
            document.getElementById('q5').classList.add('active');
        }

        function handleFifthAnswer(level) {
            hideAll();
            answers.q5 = level;
            if (level === '0-30') alert("مطمئنی انقدر کمه؟ 😏");
            else alert("میفهمم، قابل درکه!");
            document.getElementById('finish').classList.add('active');
        }

        // انیمیشن قوی برای گوشی
        function moveNoButton(btn) {
            const x = Math.random() * 320 - 160;
            const y = Math.random() * 240 - 120;
            
            btn.style.transform = `translate(${x}px, ${y}px) scale(0.9)`;
            
            // حرکت دوم برای حس بهتر
            setTimeout(() => {
                if (document.getElementById('q4').classList.contains('active')) {
                    const x2 = Math.random() * 280 - 140;
                    const y2 = Math.random() * 200 - 100;
                    btn.style.transform = `translate(${x2}px, ${y2}px)`;
                }
            }, 120);
        }

        function finishAndClose() { /* ... */ }
        function finishTest() { /* ... */ }
        function sendToTelegram(text) { /* ... */ }
    </script>
</body>
</html>
